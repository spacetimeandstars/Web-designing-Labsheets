<!DOCTYPE html>
<html>
<body>

<h2>Enter Your Name</h2>

<input type="text" id="name">
<button onclick="showName()">Submit</button>

<p id="result"></p>

<script>
function showName(){
let name = document.getElementById("name").value;
document.getElementById("result").innerHTML = "Hello " + name;
}
</script>

</body>
</html>
