<!DOCTYPE html>
<html>
<head>
<style>
form {
    width: 300px;
    margin: auto;
    padding: 20px;
    border: 2px solid gray;
    border-radius: 15px;   /* Rounded corners for form */
}

input {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
    border-radius: 10px;   /* Rounded corners for inputs */
}
</style>
</head>
<body>

<form>
    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <input type="submit" value="Submit">
</form>

</body>
</html>
