<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <style>
        body {
            background-color: #e6f2ff;
            font-family: Arial;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Registration Form</h2>

    <form>
        Name:
        <input type="text" required>

        Email:
        <input type="email" required>

        Course:
        <select>
            <option>BCA</option>
            <option>MCA</option>
            <option>B.Tech</option>
        </select>

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
