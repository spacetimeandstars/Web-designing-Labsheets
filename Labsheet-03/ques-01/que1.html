<!DOCTYPE html>
<html>
<head>
    <title>Inline CSS Form</title>
</head>
<body>

<h2 style="color:blue; text-align:center;">Login Form</h2>

<form style="border:1px solid gray; padding:20px; width:300px; margin:auto;">
    Username:<br>
    <input type="text" style="width:100%; padding:5px;"><br><br>
    Password:<br>
    <input type="password" style="width:100%; padding:5px;"><br><br>
    <input type="submit" value="Login" style="background:green; color:white; padding:8px;">
</form>

</body>
</html>
